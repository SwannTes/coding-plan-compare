name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to Vercel
        run: |
          curl -s -X POST "https://api.vercel.com/v1/deployments" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "coding-plan-compare",
              "gitSource": {
                "repo": "SwannTes/coding-plan-compare",
                "type": "github",
                "ref": "main"
              },
              "projectId": "prj_0s20WKMso051WD0qfRCZCPQff6bF",
              "teamId": "team_4Xw12qEIQVOIFLDnpPJzGIIK"
            }'
